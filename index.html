<!doctype html>
<html lang="tr" dir="ltr">
  <head>
    <!-- Karakter seti ve viewport — her şeyden önce gelmeli -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ── Temel SEO ── -->
    <title>Takimax | Takı, Aksesuar ve Kozmetik – Türkiye'nin Online Mağazası</title>
    <meta name="description" content="Takimax ile 925 ayar gümüş kolye, küpe, bileklik, yüzük ve daha fazlası uygun fiyatlarla kapınızda. Kadın, erkek ve çocuk aksesuar ile kozmetik ürünlerde güvenli alışveriş, hızlı kargo." />
    <meta name="keywords" content="takı, aksesuar, gümüş kolye, küpe, bileklik, yüzük, erkek takı, kadın takı, çocuk takı, hediye seti, kozmetik, saç aksesuarı, online takı mağazası, türkiye takı" />
    <meta name="author" content="Takimax" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />

    <!-- ── Canonical ── -->
    <link rel="canonical" href="https://takimax.com/" />

    <!-- ── Dil ve Bölge ── -->
    <meta name="geo.region" content="TR" />
    <meta name="geo.placename" content="Türkiye" />
    <meta name="language" content="Turkish" />
    <link rel="alternate" hreflang="tr" href="https://takimax.com/" />
    <link rel="alternate" hreflang="x-default" href="https://takimax.com/" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Takimax" />
    <meta property="og:title" content="Takimax | Takı, Aksesuar ve Kozmetik – Türkiye'nin Online Mağazası" />
    <meta property="og:description" content="925 ayar gümüş kolye, küpe, bileklik, yüzük ve daha fazlası uygun fiyatlarla kapınızda. Güvenli alışveriş, hızlı kargo, kolay iade." />
    <meta property="og:url" content="https://takimax.com/" />
    <meta property="og:image" content="https://takimax.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Takimax – Takı ve Aksesuar Mağazası" />
    <meta property="og:locale" content="tr_TR" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@takimax" />
    <meta name="twitter:creator" content="@takimax" />
    <meta name="twitter:title" content="Takimax | Takı, Aksesuar ve Kozmetik" />
    <meta name="twitter:description" content="925 ayar gümüş kolye, küpe, bileklik ve daha fazlası. Güvenli alışveriş, hızlı kargo." />
    <meta name="twitter:image" content="https://takimax.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="Takimax – Takı ve Aksesuar Mağazası" />

    <!-- ── Structured Data / Schema.org (JSON-LD) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "OnlineStore",
      "name": "Takimax",
      "description": "Türkiye'nin online takı, aksesuar ve kozmetik mağazası. 925 ayar gümüş kolye, küpe, bileklik, yüzük ve daha fazlası.",
      "url": "https://takimax.com",
      "logo": "https://takimax.com/logo.svg",
      "image": "https://takimax.com/og-image.jpg",
      "telephone": "",
      "email": "info@takimax.com",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "TR",
        "addressLocality": "Türkiye"
      },
      "sameAs": [],
      "priceRange": "₺₺",
      "currenciesAccepted": "TRY",
      "paymentAccepted": "Kredi Kartı, Banka Kartı",
      "openingHours": "Mo-Su 00:00-23:59",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Takı ve Aksesuar Koleksiyonu",
        "itemListElement": [
          { "@type": "OfferCatalog", "name": "Kadın Aksesuar" },
          { "@type": "OfferCatalog", "name": "Erkek Aksesuar" },
          { "@type": "OfferCatalog", "name": "Çocuk Aksesuar" },
          { "@type": "OfferCatalog", "name": "Saç Ürünleri" },
          { "@type": "OfferCatalog", "name": "Hediyelik Setler" },
          { "@type": "OfferCatalog", "name": "Kozmetik" }
        ]
      }
    }
    </script>

    <!-- ── Breadcrumb Schema ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Takimax",
      "url": "https://takimax.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://takimax.com/arama?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Favicon & Uygulama İkonları ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Performans: Kritik fontları önceden yükle ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <!-- Font preload: FOUT'u önler -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/cormorantgaramond/v22/co3YmX5slCNuHLi8bLeY9MK7whWMhyjornFLsS6V7wx_.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>

  <body>
    <!-- Noscript: JS kapalı tarayıcılar ve crawlerlar için -->
    <noscript>
      <div style="padding:20px;text-align:center;font-family:sans-serif;">
        Takimax'i kullanmak için lütfen JavaScript'i etkinleştirin.
      </div>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
